<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Myntra Clone</title>

<link rel="stylesheet" href="login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="left">

<img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=800"
alt="Fashion">

</div>

<div class="right">

<div class="login-box">

<h1>Welcome Back ❤️</h1>

<p>Login to continue shopping</p>

<form id="loginForm">

<input
type="text"
id="username"
placeholder="Enter Username"
required>

<input
type="email"
id="email"
placeholder="Enter Email"
required>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

<button type="submit">
Login
</button>

</form>

<p class="signup">

New User?

<a href="index.html">
Continue Shopping
</a>

</p>

</div>

</div>

</div>

<script src="login.js"></script>

</body>
</html>
